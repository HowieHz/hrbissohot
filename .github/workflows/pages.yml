name: 📄 GitHub Pages 部署

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: 📊 Generate Data
        run: |
          echo "🔍 Running data analysis..."
          python tools/environment_analyzer.py . || echo "Analysis completed with warnings"
          
      - name: 🏗️ Build Site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/ 2>/dev/null || mkdir -p _site/data
          cp -r images _site/ 2>/dev/null || mkdir -p _site/images
          
          # Create a simple sitemap
          echo "Creating sitemap..."
          cat > _site/sitemap.txt << EOF
          https://$(echo ${{ github.repository }} | cut -d'/' -f1).github.io/$(echo ${{ github.repository }} | cut -d'/' -f2)/
          https://$(echo ${{ github.repository }} | cut -d'/' -f1).github.io/$(echo ${{ github.repository }} | cut -d'/' -f2)/data/summary_report.md
          EOF
          
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
